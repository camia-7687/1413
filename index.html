<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>413幸運輪盤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #FDFBF0; 
            color: #5D4037; 
            height: 100dvh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .app-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-around; 
            padding: 20px 0;
        }
        .wheel-box { 
            position: relative; 
            width: 90vw; 
            max-width: 400px; 
            height: 90vw; 
            max-height: 400px; 
            margin: 0 auto; 
        }
        .pointer { 
            position: absolute; 
            top: -10px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: 30px; 
            height: 40px; 
            background: #FF8A80; 
            clip-path: polygon(50% 100%, 0 0, 100% 0); 
            z-index: 20; 
        }
        canvas { width: 100% !important; height: 100% !important; border-radius: 50%; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .btn-spin { 
            background: linear-gradient(135deg, #B2EBF2 0%, #C8E6C9 100%); 
            color: #455A64;
            box-shadow: 0 4px 15px rgba(178, 235, 242, 0.4);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <h1 class="text-4xl font-black text-center tracking-widest text-[#5D4037]">413幸運輪盤</h1>
        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheelCanvas" width="800" height="800"></canvas>
        </div>
        <div class="flex flex-col items-center gap-4">
            <button id="spinBtn" class="btn-spin font-black py-4 px-12 rounded-full text-2xl active:scale-95 transition-transform disabled:opacity-50">開始旋轉</button>
            <div id="result" class="text-2xl font-bold text-[#FF8A80] h-8 text-center"></div>
        </div>
    </div>
    <script>
        const prizeData = {
            high: [{name:"上上籤",color:"#F8BBD0"},{name:"頭獎",color:"#E1BEE7"}],
            mid: [{name:"二獎",color:"#B2EBF2"},{name:"三獎",color:"#C8E6C9"}],
            low: {name:"四獎",color:"#FFF9C4"},
            cons: {name:"安慰獎",color:"#BBDEFB"},
            retry: {name:"再接再厲",color:"#F5F5F5"}
        };

        // 建立 50 格的獎項陣列
        let prizes = Array(50).fill(prizeData.retry);

        // 精心設計的交錯分布位置 (索引值從 0 到 49)
        const distribution = [
            { idx: 0,  p: prizeData.high[0] }, // 上上籤
            { idx: 6,  p: prizeData.cons },    // 安慰獎
            { idx: 12, p: prizeData.mid[1] },  // 三獎
            { idx: 18, p: prizeData.cons },    // 安慰獎
            { idx: 25, p: prizeData.low },     // 四獎
            { idx: 31, p: prizeData.high[1] }, // 頭獎
            { idx: 37, p: prizeData.cons },    // 安慰獎
            { idx: 43, p: prizeData.mid[0] }   // 二獎
        ];

        distribution.forEach(item => {
            prizes[item.idx] = item.p;
        });

        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');
        let currentRot = 0;
        let isSpinning = false;

        function draw() {
            const arc = (2 * Math.PI) / 50;
            ctx.clearRect(0,0,800,800);
            prizes.forEach((p, i) => {
                const ang = i * arc + currentRot;
                ctx.beginPath(); 
                ctx.fillStyle = p.color; 
                ctx.moveTo(400, 400);
                ctx.arc(400, 400, 380, ang, ang + arc); 
                ctx.fill();
                ctx.strokeStyle = "rgba(0,0,0,0.02)"; 
                ctx.stroke();
                
                ctx.save(); 
                ctx.translate(400, 400); 
                ctx.rotate(ang + arc/2);
                ctx.fillStyle = "#5D4037"; 
                ctx.font = "bold 16px Arial"; 
                ctx.fillText(p.name, 260, 6); 
                ctx.restore();
            });
            ctx.beginPath(); ctx.arc(400, 400, 20, 0, Math.PI*2); ctx.fillStyle = "#fff"; ctx.fill();
        }

        spinBtn.onclick = () => {
            if (isSpinning) return;
            isSpinning = true; 
            spinBtn.disabled = true; 
            resultDiv.innerText = "";
            
            // 隨機增加旋轉圈數與角度
            let totalRotation = 40 + Math.random() * 30; 
            let start = null;
            let duration = 4000;

            function ani(ts) {
                if(!start) start = ts;
                let progress = ts - start;
                let t = progress / duration;
                
                // 緩動公式讓旋轉更自然
                let easing = 1 - Math.pow(1 - t, 4);
                let currentTotal = totalRotation * easing;
                
                currentRot = currentTotal;
                draw();
                
                if(progress < duration) {
                    requestAnimationFrame(ani);
                } else {
                    isSpinning = false; 
                    spinBtn.disabled = false;
                    // 計算指針所對應的正確索引
                    const final = (1.5 * Math.PI - (currentRot % (2*Math.PI)) + 2*Math.PI) % (2*Math.PI);
                    const idx = Math.floor(final / ((2*Math.PI)/50));
                    resultDiv.innerText = "獲得獎項：" + prizes[idx].name;
                }
            }
            requestAnimationFrame(ani);
        };
        draw();
    </script>
</body>
</html>
